<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art of Perfume | Página no encontrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(160deg,#fbfaff 0%,#f3eeff 50%,#ece4ff 100%);
            min-height:100vh;display:flex;justify-content:center;align-items:center;
            padding:20px;color:#2d1b69;
        }
        .container{
            text-align:center;max-width:440px;
            background:rgba(255,255,255,.9);
            backdrop-filter:blur(24px);
            border:1px solid rgba(106,56,194,.05);
            border-radius:28px;padding:52px 30px 44px;
            box-shadow:0 24px 80px rgba(106,56,194,.06);
        }
        .emoji{font-size:4em;margin-bottom:16px}
        h1{
            font-size:1.5em;font-weight:800;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;margin-bottom:12px;
        }
        p{color:#8a7ab5;font-size:14px;margin-bottom:28px;line-height:1.6}
        a{
            display:inline-block;padding:14px 32px;border-radius:14px;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            color:white;text-decoration:none;font-weight:600;font-size:14px;
            box-shadow:0 6px 24px rgba(106,56,194,.3);
            transition:all .3s;
        }
        a:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(106,56,194,.4)}
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">💜</div>
        <h1>Página no encontrada</h1>
        <p>Lo sentimos, esta página no existe. Pero tu perfume ideal sí te está esperando.</p>
        <a href="/">Ir al Quiz →</a>
    </div>
</body>
</html>
