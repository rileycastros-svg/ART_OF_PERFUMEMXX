<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Art of Perfume | Descubre tu perfume ideal</title>
    <meta name="description" content="Quiz interactivo de Art of Perfume. Descubre tu perfil olfativo y encuentra el perfume ideal según tu personalidad y estilo.">
    <meta name="theme-color" content="#6a38c2">
    <meta property="og:title" content="Art of Perfume | Quiz de Perfumes">
    <meta property="og:description" content="Descubre tu perfil olfativo y encuentra el perfume ideal según tu personalidad.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/art-of-perfume-dupe.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fimgs.net">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}

        body{
            font-family:'Inter',system-ui,-apple-system,sans-serif;
            background:linear-gradient(160deg,#fbfaff 0%,#f3eeff 50%,#ece4ff 100%);
            min-height:100vh;display:flex;justify-content:center;align-items:center;
            padding:12px;overflow-x:hidden;color:#2d1b69;
        }

        /* ── ambient blobs ── */
        body::before,body::after{
            content:'';position:fixed;border-radius:50%;
            pointer-events:none;filter:blur(90px);opacity:.12;z-index:0;
        }
        body::before{
            width:400px;height:400px;
            background:radial-gradient(circle,#7c3aed,transparent 70%);
            top:-100px;right:-80px;
            animation:drift 12s ease-in-out infinite alternate;
        }
        body::after{
            width:350px;height:350px;
            background:radial-gradient(circle,#a855f7,transparent 70%);
            bottom:-80px;left:-60px;
            animation:drift 15s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift{
            0%{transform:translate(0,0) scale(1)}
            100%{transform:translate(40px,-50px) scale(1.2)}
        }

        /* ── app container ── */
        .app{
            width:440px;max-width:100%;position:relative;z-index:1;
            animation:appIn .7s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes appIn{
            0%{opacity:0;transform:translateY(40px) scale(.95)}
            100%{opacity:1;transform:none}
        }
        @keyframes float{
            0%{transform:translateY(0)}
            100%{transform:translateY(-6px)}
        }

        /* ── header ── */
        .header{
            text-align:center;padding:24px 20px 14px;
            background:linear-gradient(180deg,rgba(245,240,255,.6),transparent);
            position:relative;
        }
        .logo-wrap{
            width:170px;height:170px;margin:0 auto 6px;
            border-radius:50%;position:relative;
            display:flex;align-items:center;justify-content:center;
        }
        .logo-wrap::before{
            content:'';position:absolute;inset:-4px;
            border-radius:50%;
            background:conic-gradient(from 0deg,#6a38c2,#9c5ef5,#c4b5fd,#9c5ef5,#6a38c2);
            animation:logoSpin 4s linear infinite;
            opacity:.6;
        }
        @keyframes logoSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
        .logo-wrap::after{
            content:'';position:absolute;inset:0;
            border-radius:50%;background:white;
        }
        .logo{
            width:145px;height:145px;display:block;
            border-radius:50%;object-fit:cover;
            position:relative;z-index:1;
            transition:transform .3s ease;
        }
        .logo:hover{transform:scale(1.05)}
        .brand-name{
            font-size:12px;font-weight:700;color:#6a38c2;
            letter-spacing:2px;text-transform:uppercase;margin-top:2px;
        }
        .logo-placeholder{
            font-size:1.4em;font-weight:800;color:#6a38c2;
            letter-spacing:1px;text-align:center;
        }

        /* ── progress dots ── */
        .dots{
            display:flex;justify-content:center;gap:6px;padding:8px 0 4px;
        }
        .dot{
            width:8px;height:8px;border-radius:50%;
            background:rgba(106,56,194,.12);
            transition:all .4s cubic-bezier(.4,0,.2,1);
        }
        .dot.active{
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            transform:scale(1.4);
            box-shadow:0 0 12px rgba(156,94,245,.35);
        }
        .dot.done{background:#6a38c2}

        /* ── card stack ── */
        .card-stack{
            position:relative;min-height:340px;
            perspective:800px;margin:8px 0;
        }

        .quiz-card{
            position:absolute;top:0;left:0;right:0;
            background:rgba(255,255,255,.92);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border:1px solid rgba(106,56,194,.1);
            border-radius:24px;padding:28px 22px 22px;
            box-shadow:0 16px 48px rgba(106,56,194,.08),0 1px 3px rgba(106,56,194,.04);
            transition:transform .15s ease,opacity .15s ease;
            will-change:transform,opacity;
        }
        .quiz-card.behind{
            transform:scale(.93) translateY(14px);
            opacity:.35;pointer-events:none;
            filter:blur(2px);
        }

        /* swipe animation */
        @keyframes swipeRight{
            0%{transform:translateX(0) rotate(0);opacity:1}
            100%{transform:translateX(120%) rotate(18deg);opacity:0}
        }
        @keyframes swipeLeft{
            0%{transform:translateX(0) rotate(0);opacity:1}
            100%{transform:translateX(-120%) rotate(-18deg);opacity:0}
        }
        @keyframes cardEnter{
            0%{transform:scale(.93) translateY(14px);opacity:.4;filter:blur(2px)}
            100%{transform:scale(1) translateY(0);opacity:1;filter:blur(0)}
        }
        .quiz-card.swiping-right{animation:swipeRight .45s cubic-bezier(.4,0,.2,1) forwards}
        .quiz-card.swiping-left{animation:swipeLeft .45s cubic-bezier(.4,0,.2,1) forwards}
        .quiz-card.entering{animation:cardEnter .4s cubic-bezier(.16,1,.3,1) forwards}

        .card-emoji{
            font-size:2.4em;text-align:center;margin-bottom:8px;
            filter:drop-shadow(0 2px 8px rgba(106,56,194,.1));
            animation:float 3s ease-in-out infinite alternate;
        }
        @keyframes float{
            0%{transform:translateY(0)}100%{transform:translateY(-6px)}
        }

        .card-question{
            text-align:center;font-size:1.1em;font-weight:700;
            color:#3a1d7a;margin-bottom:16px;line-height:1.4;
            padding-bottom:14px;
            border-bottom:1px solid rgba(106,56,194,.08);
        }

        .card-options{
            display:grid;grid-template-columns:1fr 1fr;gap:8px;
        }

        .option-btn{
            width:100%;padding:13px 12px;
            border:1.5px solid rgba(106,56,194,.1);
            border-radius:12px;
            background:white;
            color:#3a1d7a;font-family:inherit;font-size:13px;font-weight:600;
            cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
            text-align:center;position:relative;overflow:hidden;
            line-height:1.3;
            box-shadow:0 2px 6px rgba(106,56,194,.04);
        }
        .option-btn:hover{
            background:#f5f0ff;
            border-color:#9c5ef5;
            transform:translateY(-3px) scale(1.02);
            box-shadow:0 6px 20px rgba(106,56,194,.12);
        }
        .option-btn:active{
            transform:translateY(0) scale(.97);
            background:#ede5ff;border-color:#6a38c2;
        }

        /* ── welcome screen ── */
        .welcome{
            text-align:center;
            background:rgba(255,255,255,.9);
            backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
            border:1px solid rgba(106,56,194,.05);
            border-radius:28px;padding:52px 30px 44px;
            box-shadow:0 24px 80px rgba(106,56,194,.06);
        }
        .welcome h1{
            font-size:1.5em;font-weight:800;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;margin-bottom:8px;letter-spacing:-.3px;
        }
        .welcome-divider{
            width:40px;height:2px;margin:0 auto 14px;
            background:linear-gradient(90deg,transparent,#9c5ef5,transparent);
            border-radius:2px;
        }
        .welcome-sub{
            color:#8a7ab5;font-size:13px;margin-bottom:36px;line-height:1.6;
            font-weight:400;
        }
        .start-btn{
            width:100%;padding:16px;border:none;border-radius:14px;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            color:white;font-family:inherit;font-size:15px;font-weight:600;
            cursor:pointer;letter-spacing:.5px;
            box-shadow:0 6px 24px rgba(106,56,194,.3);
            transition:all .3s cubic-bezier(.4,0,.2,1);
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .start-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 35px rgba(106,56,194,.4);
        }
        .start-btn .arrow{
            display:inline-block;transition:transform .3s;
            font-size:1.1em;
        }
        .start-btn:hover .arrow{transform:translateX(5px)}

        /* ── results ── */
        @keyframes resultIn{
            0%{opacity:0;transform:translateY(30px)}
            100%{opacity:1;transform:none}
        }
        .results{animation:resultIn .6s cubic-bezier(.16,1,.3,1) both}

        .profile-card{
            background:linear-gradient(145deg,#f8f4ff,#ede5ff);
            border:1px solid rgba(216,204,255,.6);
            border-radius:22px;padding:24px 18px;margin-bottom:16px;
            position:relative;overflow:hidden;
        }
        .profile-deco{
            position:absolute;top:0;left:0;right:0;bottom:0;
            pointer-events:none;overflow:hidden;
            opacity:.08;font-size:2.2em;
        }
        .profile-deco span{
            position:absolute;
            animation:floatDeco 6s ease-in-out infinite alternate;
        }
        .profile-deco span:nth-child(1){top:8%;left:5%;animation-delay:0s}
        .profile-deco span:nth-child(2){top:60%;right:8%;animation-delay:1s}
        .profile-deco span:nth-child(3){bottom:10%;left:15%;animation-delay:2s}
        .profile-deco span:nth-child(4){top:20%;right:20%;animation-delay:.5s}
        .profile-deco span:nth-child(5){bottom:25%;right:5%;animation-delay:1.5s}
        @keyframes floatDeco{
            0%{transform:translateY(0) rotate(0deg)}
            100%{transform:translateY(-8px) rotate(8deg)}
        }
        .profile-card h3{
            text-align:center;font-size:1.2em;font-weight:800;
            color:#3a1d7a;margin-bottom:10px;position:relative;z-index:1;
        }
        .profile-desc{
            text-align:center;font-size:13px;color:#5a4a7a;
            line-height:1.6;font-style:italic;margin-bottom:14px;
            position:relative;z-index:1;
        }
        .profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:10px 0 4px;position:relative;z-index:1}
        .stat{
            background:rgba(255,255,255,.8);border-radius:10px;
            padding:6px 8px;text-align:center;
            border:1px solid rgba(106,56,194,.05);
            box-shadow:0 1px 4px rgba(106,56,194,.04);
            backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
        }
        .stat-label{
            font-size:8px;color:#8a7ab5;text-transform:uppercase;
            letter-spacing:.7px;font-weight:700;
        }
        .stat-value{font-size:10px;color:#3a1d7a;margin-top:2px;font-weight:500;line-height:1.3}
        .tip-text{
            font-size:11px;color:#6a38c2;margin:10px 0 0;
            text-align:center;position:relative;z-index:1;
        }
        .ref-label{
            font-size:10px;color:#8a7ab5;text-align:center;
            letter-spacing:1px;text-transform:uppercase;font-weight:600;
            margin:16px 0 8px;opacity:.7;
        }

        /* ── perfume grid ── */
        .perfume-grid{
            display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;
        }
        .perfume-card{
            background:white;border:1px solid rgba(106,56,194,.06);
            border-radius:16px;padding:12px;text-align:center;
            box-shadow:0 2px 10px rgba(106,56,194,.06);
            transition:transform .3s,box-shadow .3s;
        }
        .perfume-card:hover{
            transform:translateY(-4px);
            box-shadow:0 8px 24px rgba(106,56,194,.12);
        }
        .perfume-card img{
            width:100%;max-width:75px;margin:auto;display:block;
            border-radius:8px;transition:transform .3s;
        }
        .perfume-card:hover img{transform:scale(1.06)}
        .perfume-card h3{font-size:11px;margin:8px 0 2px;color:#3a1d7a;font-weight:600}
        .perfume-card p{font-size:10px;color:#6b5b8a;margin:0 0 8px;line-height:1.3}
        .buy-link{
            display:block;background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            color:white;padding:7px;border-radius:8px;font-family:inherit;
            font-size:10px;font-weight:600;text-decoration:none;text-align:center;
            transition:all .2s;
        }
        .buy-link:hover{box-shadow:0 3px 12px rgba(106,56,194,.3);transform:translateY(-1px)}

        /* ── dupe card ── */
        .dupe-card{
            grid-column:1/-1;
            background:linear-gradient(145deg,#f8f4ff,#ede5ff);
            border:2.5px solid #6a38c2;
            border-radius:20px;padding:18px;text-align:center;
            position:relative;overflow:hidden;
            animation:dupeGlow 2s ease-in-out infinite alternate;
        }
        @keyframes dupeGlow{
            0%{box-shadow:0 8px 25px rgba(106,56,194,.2)}
            100%{box-shadow:0 12px 40px rgba(106,56,194,.35)}
        }
        .dupe-card::before{
            content:'';position:absolute;top:-50%;left:-50%;
            width:200%;height:200%;
            background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.3) 50%,transparent 60%);
            animation:shimmer 3.5s infinite;
        }
        @keyframes shimmer{
            0%{transform:translateX(-100%) rotate(25deg)}
            100%{transform:translateX(100%) rotate(25deg)}
        }
        .dupe-card img{
            width:100%;max-width:200px;margin:auto;display:block;
            border-radius:12px;position:relative;z-index:1;
            transition:transform .3s;
        }
        .dupe-card:hover img{transform:scale(1.03)}
        .dupe-card h3{font-size:14px;color:#3a1d7a;margin:10px 0 4px;position:relative;z-index:1;font-weight:700}
        .dupe-card p{font-size:11px;color:#5a4a7a;margin:0 0 8px;position:relative;z-index:1}
        .dupe-tag{
            display:inline-block;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            color:white;font-size:10px;font-weight:700;
            padding:4px 14px;border-radius:20px;margin-bottom:8px;
            position:relative;z-index:1;
        }
        .dupe-badge{
            display:inline-block;
            background:linear-gradient(135deg,#ff6b35,#ff8f5e);
            color:white;font-size:9px;font-weight:700;
            padding:3px 10px;border-radius:10px;margin-bottom:6px;
            position:relative;z-index:1;
        }
        .dupe-price{font-size:12px;color:#6a38c2;font-weight:700;position:relative;z-index:1}
        .buy-dupe{
            display:inline-block;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            color:white;border:none;padding:12px 24px;border-radius:12px;
            font-family:inherit;font-size:13px;font-weight:700;
            text-decoration:none;position:relative;z-index:1;cursor:pointer;
            box-shadow:0 4px 18px rgba(106,56,194,.35);
            transition:all .25s;
        }
        .buy-dupe:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 6px 25px rgba(106,56,194,.45)}

        /* ── social icons ── */
        .social-section{
            text-align:center;margin-top:18px;position:relative;z-index:1;
        }
        .social-section p{
            font-size:11px;color:#8a7ab5;font-weight:600;margin-bottom:10px;
            letter-spacing:.5px;text-transform:uppercase;
        }
        .social-icons{display:flex;justify-content:center;gap:12px}
        .social-icon{
            display:flex;align-items:center;justify-content:center;
            width:46px;height:46px;border-radius:14px;
            text-decoration:none;transition:all .3s cubic-bezier(.4,0,.2,1);
            box-shadow:0 3px 12px rgba(0,0,0,.08);
        }
        .social-icon:hover{
            transform:translateY(-3px) scale(1.08);
            box-shadow:0 6px 20px rgba(0,0,0,.15);
        }
        .social-icon.tiktok{background:#000}
        .social-icon.instagram{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)}
        .social-icon svg{width:22px;height:22px;fill:white}

        .restart-btn{
            width:100%;padding:14px;margin-top:16px;border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#6a38c2,#9c5ef5);
            color:white;font-family:inherit;font-size:14px;font-weight:600;
            cursor:pointer;transition:all .2s;
            box-shadow:0 4px 15px rgba(106,56,194,.3);
        }
        .restart-btn:hover{box-shadow:0 6px 20px rgba(106,56,194,.4);transform:translateY(-1px)}

        /* ── sparkles ── */
        .sparkle{
            position:fixed;pointer-events:none;z-index:9999;
            border-radius:50%;
            animation:sparkUp 1.2s ease-out forwards;
        }
        @keyframes sparkUp{
            0%{opacity:1;transform:translateY(0) scale(1)}
            100%{opacity:0;transform:translateY(-140px) scale(0)}
        }

        /* ── footer ── */
        .footer{
            text-align:center;padding:14px 0 4px;
            font-size:10px;color:#b0a0d0;letter-spacing:.5px;
        }
        .footer a{color:#8a7ab5;text-decoration:none;font-weight:600}
        .footer a:hover{color:#6a38c2}

        /* ── responsive ── */
        @media(max-width:480px){
            body{padding:6px;align-items:flex-start}
            .app{margin-top:4px}
            .welcome{padding:28px 18px;border-radius:22px}
            .welcome h1{font-size:1.3em}
            .quiz-card{padding:22px 16px 18px;border-radius:20px}
            .card-emoji{font-size:2.2em}
            .card-question{font-size:1.05em}
            .option-btn{padding:11px 14px;font-size:13px}
            .profile-stats{grid-template-columns:1fr}
            .perfume-grid{grid-template-columns:1fr;gap:10px}
            .perfume-card img{max-width:100px}
            .dupe-card img{max-width:150px}
            .gender-grid{flex-direction:column}
        }

        @media(prefers-reduced-motion:reduce){
            *,*::before,*::after{
                animation-duration:.01ms!important;
                transition-duration:.01ms!important;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo-wrap">
                <img class="logo" src="images/logo.jpg" alt="Art of Perfume"
                     onerror="this.style.display='none';this.parentElement.nextElementSibling.style.display='block'">
            </div>
            <div class="brand-name">Art of Perfume</div>
            <div class="logo-placeholder" style="display:none">✨ Art of Perfume ✨</div>
        </div>
        <div id="main"></div>
        <div class="footer">Hecho con 💜 por <a href="https://www.tiktok.com/@artofperfumee?_r=1&_t=ZS-953q10CpmGC" target="_blank" rel="noopener">Art of Perfume</a></div>
    </div>

<script>
/* ═══════════════════════════════════════════
   DATA — Questions, Profiles, Perfumes
   ═══════════════════════════════════════════ */

const questions = [
    {

    },

            { text: "🌸 Sensible y especial", type: "floral" },
            { text: "🤗 Confortado y seguro", type: "dulce" },
            { text: "💎 Audaz y memorable", type: "fuerte" },

            { text: "🧭 Libre y sin ataduras", type: "acuatico" }

    },
    {
        emoji: "🕰️", q: "¿En qué momento del día te sientes en tu mejor versión?", options: [
            { text: "☀️ Por la mañana, con energía y claridad", type: "citrico" },
            { text: "🌷 A media mañana, con calma y luz suave", type: "floral" },
            { text: "🌇 Por la tarde, cuando el ritmo se afloja", type: "dulce" },
            { text: "🌙 De noche, cuando todo cobra intensidad", type: "fuerte" },
            { text: "🌅 Al atardecer, en reflexión y silencio", type: "amaderado" },
            { text: "💫 En cualquier punto de un viaje inesperado", type: "acuatico" }
        ]
    },
    {
        emoji: "🎨", q: "¿Qué paleta describe mejor tu estética personal?", options: [
            { text: "💚 Blancos, verdes frescos y amarillos vivos", type: "citrico" },
            { text: "🌸 Rosas, mauves y lilas suaves", type: "floral" },
            { text: "🤍 Cremas, dorados y ámbar cálido", type: "dulce" },
            { text: "🖤 Negros, borgoña y plateados", type: "fuerte" },
            { text: "🤎 Ocres, tierra y verde oscuro", type: "amaderado" },
            { text: "🩵 Azules, grises y blancos nítidos", type: "acuatico" }
        ]
    },

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }

/* ═══════════════════════════════════════════

function showWelcome(){
    main.innerHTML = `
        <div class="welcome">
            <h1>Tu Perfume, Tu Identidad</h1>
            <div class="welcome-divider"></div>
            <p class="welcome-sub">7 preguntas. Un perfil único.<br>Descubre cuál es la tuya con Art of Perfume.</p>
            <button class="start-btn" onclick="showCard()">Empezar Quiz <span class="arrow">→</span></button>
        </div>`;
}

/* ═══════════════════════════════════════════
   CARD UI
   ═══════════════════════════════════════════ */

function renderDots(){
    let d = '<div class="dots">';
    for(let i=0;i<questions.length;i++){
        let cls = i < qIndex ? 'dot done' : i === qIndex ? 'dot active' : 'dot';
        d += '<div class="'+cls+'"></div>';
    }
    d += '</div>';
    return d;
}

function showCard(){
    const q = questions[qIndex];
    const nextQ = questions[qIndex + 1];

    let behind = '';
    if(nextQ){
        behind = `<div class="quiz-card behind">
            <div class="card-emoji">${nextQ.emoji}</div>
            <div class="card-question">${nextQ.q}</div>
        </div>`;
    }

    let opts = '';
    q.options.forEach(function(o){
        opts += `<button class="option-btn" onclick="answer('${o.type}')">${o.text}</button>`;
    });

    main.innerHTML = renderDots() + `
        <div class="card-stack">
            ${behind}
            <div class="quiz-card entering" id="activeCard">
                <div class="card-emoji">${q.emoji}</div>
                <div class="card-question">${q.q}</div>
                <div class="card-options">${opts}</div>
            </div>
        </div>`;
}

function answer(type){
    score[type]++;
    const card = document.getElementById("activeCard");
    if(!card) return;

    // disable buttons
    card.querySelectorAll('.option-btn').forEach(function(b){b.disabled=true});

    // random swipe direction
    const dir = Math.random() > 0.5 ? 'swiping-right' : 'swiping-left';
    card.classList.remove('entering');
    card.classList.add(dir);

    setTimeout(function(){
        qIndex++;
        if(qIndex < questions.length){
            showCard();
        } else {
            showResult();
        }
    }, 400);
}

/* ═══════════════════════════════════════════
   SPARKLES
   ═══════════════════════════════════════════ */

function sparkles(){
    const cols = ['#7c3aed','#a855f7','#c4b5fd','#f97316','#fbbf24','#ec4899'];
    for(let i=0;i<25;i++){
        setTimeout(function(){
            const s = document.createElement('div');
            s.className='sparkle';
            const sz = Math.random()*10+4;
            s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+
                ';left:'+(Math.random()*100)+'vw;top:'+(Math.random()*70+15)+'vh';
            document.body.appendChild(s);
            setTimeout(function(){s.remove()},1200);
        }, i*60);
    }
}
